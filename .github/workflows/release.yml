name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .alfredworkflow
        run: zip QuickTranslate.alfredworkflow info.plist translate.py icon.png

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" QuickTranslate.alfredworkflow --clobber --repo "${{ github.repository }}"
